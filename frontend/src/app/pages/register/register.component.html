<div class="auth-container">
  <div class="auth-card glass">
    <div class="auth-header">
      <div class="logo-sm">G</div>
      <h1 class="auth-title">Bienvenue !</h1>
      <p class="auth-subtitle">Rejoignez la communauté Ghadi Ghadi</p>
    </div>

    <div *ngIf="error" class="alert-error">
      {{ error }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="fullName" class="form-label">Nom complet</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            id="fullName" 
            formControlName="fullName" 
            class="form-input" 
            placeholder="Jean Dupont"
          >
        </div>
        <div *ngIf="isSubmitted && registerForm.get('fullName')?.errors" class="error-text">
          <span *ngIf="registerForm.get('fullName')?.errors?.['required']">Le nom est requis</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <div class="input-wrapper">
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            class="form-input" 
            placeholder="votre@email.com"
          >
        </div>
        <div *ngIf="isSubmitted && registerForm.get('email')?.errors" class="error-text">
          <span *ngIf="registerForm.get('email')?.errors?.['required']">L'email est requis</span>
          <span *ngIf="registerForm.get('email')?.errors?.['email']">Email invalide</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Mot de passe</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            class="form-input" 
            placeholder="••••••••"
          >
        </div>
        <div *ngIf="isSubmitted && registerForm.get('password')?.errors" class="error-text">
          <span *ngIf="registerForm.get('password')?.errors?.['required']">Le mot de passe est requis</span>
          <span *ngIf="registerForm.get('password')?.errors?.['minlength']">Minimum 6 caractères</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword" class="form-label">Confirmer le mot de passe</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="confirmPassword" 
            formControlName="confirmPassword" 
            class="form-input" 
            placeholder="••••••••"
          >
        </div>
        <div *ngIf="isSubmitted && (registerForm.get('confirmPassword')?.errors || registerForm.errors?.['passwordMismatch'])" class="error-text">
          <span *ngIf="registerForm.get('confirmPassword')?.errors?.['required']">Confirmation requise</span>
          <span *ngIf="registerForm.errors?.['passwordMismatch']">Les mots de passe ne correspondent pas</span>
        </div>
      </div>

      <button type="submit" class="btn-primary">S'inscrire</button>
    </form>

    <div class="auth-footer">
      Déjà membre ? 
      <a routerLink="/login" class="auth-link">Se connecter</a>
    </div>
  </div>
</div>
