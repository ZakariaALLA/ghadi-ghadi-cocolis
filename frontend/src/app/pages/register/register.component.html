<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join Ghadi Ghadi Di Maak Hadi</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="fullName" class="form-label">Full Name</label>
        <input 
          type="text" 
          id="fullName" 
          formControlName="fullName" 
          class="form-input" 
          placeholder="John Doe"
        >
        <div *ngIf="isSubmitted && registerForm.get('fullName')?.errors" class="error-text">
          <span *ngIf="registerForm.get('fullName')?.errors?.['required']">Full Name is required</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-input" 
          placeholder="you@example.com"
        >
        <div *ngIf="isSubmitted && registerForm.get('email')?.errors" class="error-text">
          <span *ngIf="registerForm.get('email')?.errors?.['required']">Email is required</span>
          <span *ngIf="registerForm.get('email')?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-input" 
          placeholder="••••••••"
        >
        <div *ngIf="isSubmitted && registerForm.get('password')?.errors" class="error-text">
          <span *ngIf="registerForm.get('password')?.errors?.['required']">Password is required</span>
          <span *ngIf="registerForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          formControlName="confirmPassword" 
          class="form-input" 
          placeholder="••••••••"
        >
        <div *ngIf="isSubmitted && registerForm.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched" class="error-text">
          <span>Passwords do not match</span>
        </div>
        <div *ngIf="isSubmitted && registerForm.get('confirmPassword')?.errors" class="error-text">
          <span *ngIf="registerForm.get('confirmPassword')?.errors?.['required']">Please confirm your password</span>
        </div>
      </div>

      <button type="submit" class="btn-primary">Sign Up</button>
    </form>

    <div class="auth-footer">
      Already have an account? 
      <a routerLink="/login" class="auth-link">Log in</a>
    </div>
  </div>
</div>
