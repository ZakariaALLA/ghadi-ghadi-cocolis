<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Log in to Ghadi Ghadi Di Maak Hadi</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-input" 
          placeholder="you@example.com"
        >
        <div *ngIf="isSubmitted && loginForm.get('email')?.errors" class="error-text">
          <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</span>
          <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-input" 
          placeholder="••••••••"
        >
        <div *ngIf="isSubmitted && loginForm.get('password')?.errors" class="error-text">
          <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
          <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <button type="submit" class="btn-primary">Log In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? 
      <a routerLink="/register" class="auth-link">Sign up</a>
    </div>
  </div>
</div>
